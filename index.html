<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./assets/icons/page-icon.svg" type="image/svg+xml" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Domine:wght@400..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <!-- Icons script -->
    <script
      src="https://kit.fontawesome.com/9d44a78030.js"
      crossorigin="anonymous"
    ></script>
    <title>Portfolio Webiste-Moises Navas</title>
  </head>

  <body>
    <main>
      <!-- header and navlinks -->
      <header class="header__container wrapper">
        <img src="./assets/icons/page-icon.svg" alt="Website logo" width="50" />
        <nav>
          <ul>
            <li>
              <a href="hero">
                <i class="fa-regular fa-house"></i> <span>Home</span>
              </a>
            </li>
            <li>
              <a href="about"
                ><i class="fa-regular fa-user"></i><span>About</span></a
              >
            </li>
            <li>
              <a href="projects"
                ><i class="fa-regular fa-file-code"></i><span>Projects</span></a
              >
            </li>
            <li>
              <a href="contact"
                ><i class="fa-regular fa-envelope"></i><span>Contact</span></a
              >
            </li>
          </ul>
        </nav>
      </header>

      <!-- banner hero section  -->
      <section id="hero" class="wrapper">
        <div class="hero__info">
          <h1>
            Nice to meet you! I'm
            <span class="underline-text">Moises Navas</span>.
          </h1>
          <p>
            Based in Chicago, Front End Developer in progress. Passionate about
            building responsive and accessible web apps that users love.
          </p>
          <p class="muted">// available for opportunities</p>
          <div class="hero__links">
            <a href="">View Projects</a>
            <a href="">GitHub ↗️</a>
            <a href="">Contact Me</a>
          </div>
        </div>
        <div class="img__container">
          <img
            src="./assets/images/headshot.png"
            alt="Profile picture headhsot"
            width="300"
          />
        </div>
      </section>

      <!-- about me section  -->

      <section id="about" class="wrapper">
        <div class="img__container">
          <img
            src="./assets/images/profile-p.png"
            alt="Working on laptop at the library"
            width="250"
          />
        </div>
      </section>

      <section id="projects" class="wrapper"></section>
      <section id="contact" class="wrapper"></section>
      <footer class="wrapper"></footer>
    </main>

    <!-- website script -->
    <script src="script.js" defer></script>
  </body>
</html>
